<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reports — démo signalement</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #e8f2ec;
        --ink: #14201b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "DM Sans", system-ui, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(900px 420px at 0% 0%, rgba(11, 110, 79, 0.18), transparent 60%),
          linear-gradient(165deg, #f4faf6, #dfece5 50%, #cfe0d6);
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 64px 24px 120px;
      }
      h1 {
        font-family: "Source Serif 4", Georgia, serif;
        font-weight: 600;
        font-size: clamp(2rem, 4vw, 2.8rem);
        margin: 0 0 12px;
      }
      p { line-height: 1.55; max-width: 40rem; }
      code {
        background: rgba(11, 110, 79, 0.08);
        padding: 2px 6px;
        border-radius: 6px;
        font-size: 0.92em;
      }
      .panel {
        margin-top: 28px;
        padding: 18px 20px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(11, 110, 79, 0.12);
      }
      button.demo {
        margin-top: 12px;
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        background: #0b6e4f;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      pre {
        overflow: auto;
        background: #14201b;
        color: #d7ebe2;
        padding: 14px;
        border-radius: 12px;
        font-size: 12px;
        max-height: 280px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Reports</h1>
      <p>
        Démo du plugin de signalement. Le bouton flottant envoie vers un adaptateur
        <code>function</code> qui affiche le payload ci-dessous (aucun réseau requis).
      </p>
      <div class="panel">
        <strong>Actions</strong>
        <div>
          <button class="demo" type="button" id="open">Ouvrir le formulaire</button>
          <button class="demo" type="button" id="boom" style="background:#b42318;margin-left:8px">
            Déclencher une erreur JS
          </button>
        </div>
        <p style="margin-top:16px;margin-bottom:8px"><strong>Dernier rapport</strong></p>
        <pre id="out">Aucun envoi pour l’instant.</pre>
      </div>
    </main>
    <script type="module">
      import { Reports } from '../src/index.js';

      console.info('Demo Reports prête');
      console.warn('Exemple avertissement capturé');

      Reports.init({
        adapter: async (report) => {
          document.getElementById('out').textContent = JSON.stringify(
            {
              ...report,
              screenshot: report.screenshot?.dataUrl
                ? { ...report.screenshot, dataUrl: `[${report.screenshot.bytes} bytes omitted in preview]` }
                : report.screenshot,
            },
            null,
            2,
          );
          return { ok: true };
        },
        metadata: () => ({ appVersion: 'demo-0.1.0', demo: true }),
        screenshot: { enabled: true, requireConsent: true },
      });

      document.getElementById('open').onclick = () => Reports.open();
      document.getElementById('boom').onclick = () => {
        throw new Error('Erreur de démo intentionnelle');
      };

      // Provoke a failed fetch for network capture
      fetch('/this-route-does-not-exist-404').catch(() => {});
    </script>
  </body>
</html>
